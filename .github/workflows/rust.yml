name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-A warnings"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/trusted-programming/ascend-ci:latest

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: 'recursive'
    
    - name: Cache Submodules
      uses: actions/cache@v4
      with:
        path: AscendNPU-IR
        key: ${{ runner.os }}-submodule-${{ hashFiles('.gitmodules') }}
        restore-keys: |
          ${{ runner.os }}-submodule-
    
    - name: install clang-format
      run: apt-get update && apt-get install -y clang-format
    
    - name: Free Disk Space
      run: |
        df -h
        docker system prune -af || true
        rm -rf /usr/share/dotnet
        rm -rf /opt/ghc
        rm -rf /usr/local/share/boost
        rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h
    
    - name: Cache Rust Dependencies Only
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target/release/deps
          target/debug/deps
        key: ${{ runner.os }}-cargo-deps-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-deps-
    
    - name: Install Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Update MLIR dialect paths
      run: ./scripts/update-dialect-paths.sh

    - name: Build
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Clean up build artifacts
      if: always()
      run: |
        cargo clean --release || true
        rm -rf target/debug/incremental
        rm -rf target/debug/build
        df -h
